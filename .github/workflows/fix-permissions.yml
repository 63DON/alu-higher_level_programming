name: Fix executable permissions
on: {push: {branches: [main], paths: ['python-hello_world/0-run', 'python-hello_world/1-run_inline', 'python-hello_world/2-print.py', 'python-hello_world/3-print_number.py', 'python-hello_world/4-print_float.py', 'python-hello_world/5-print_string.py', 'python-hello_world/6-concat.py', 'python-hello_world/7-edges.py', 'python-hello_world/8-concat_edges.py', 'python-hello_world/9-easter_egg.py']}, workflow_dispatch: null}
jobs: {fix-permissions: {runs-on: ubuntu-latest, steps: [{uses: 'actions/checkout@v4'}, {name: 'Set executable bit', run: 'git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && chmod +x python-hello_world/0-run python-hello_world/1-run_inline python-hello_world/2-print.py python-hello_world/3-print_number.py python-hello_world/4-print_float.py python-hello_world/5-print_string.py python-hello_world/6-concat.py python-hello_world/7-edges.py python-hello_world/8-concat_edges.py python-hello_world/9-easter_egg.py && git add --chmod=+x python-hello_world/0-run python-hello_world/1-run_inline python-hello_world/2-print.py python-hello_world/3-print_number.py python-hello_world/4-print_float.py python-hello_world/5-print_string.py python-hello_world/6-concat.py python-hello_world/7-edges.py python-hello_world/8-concat_edges.py python-hello_world/9-easter_egg.py && (git diff --staged --quiet || (git commit -m "Fix executable bit on remaining python-hello_world scripts" && git push))'}]}}

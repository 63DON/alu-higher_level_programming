name: Fix executable permissions
on: {push: {branches: [main], paths: ['python-hello_world/0-run', 'python-hello_world/1-run_inline']}, workflow_dispatch: null}
jobs: {fix-permissions: {runs-on: ubuntu-latest, steps: [{uses: 'actions/checkout@v4'}, {name: 'Set executable bit', run: 'git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && chmod +x python-hello_world/0-run python-hello_world/1-run_inline && git add --chmod=+x python-hello_world/0-run python-hello_world/1-run_inline && (git diff --staged --quiet || (git commit -m "Fix executable bit on 0-run and 1-run_inline" && git push))'}]}}
